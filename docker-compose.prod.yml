version: "3.8"

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  qrmenu-db:
    image: postgres:15-alpine
    container_name: qrmenu-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"  # Localhost only, port 5433 to avoid conflict
    environment:
      POSTGRES_USER: qrmenu
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: qrmenu_prod
    volumes:
      - qrmenu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrmenu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrmenu-network

  # ─── Redis ──────────────────────────────────────────────────
  qrmenu-redis:
    image: redis:7-alpine
    container_name: qrmenu-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"  # Localhost only, port 6380
    volumes:
      - qrmenu_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrmenu-network

  # ─── FastAPI Application ───────────────────────────────────
  qrmenu-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: qrmenu-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:8000"  # Localhost only, port 9000 internally mapped to 8000
    environment:
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      POSTGRES_URI: postgresql+asyncpg://qrmenu:${DB_PASSWORD}@qrmenu-db:5432/qrmenu_prod
      REDIS_URI: redis://qrmenu-redis:6379/0
      REDIS_CELERY_URI: redis://qrmenu-redis:6379/1
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      qrmenu-db:
        condition: service_healthy
      qrmenu-redis:
        condition: service_healthy
    volumes:
      - ./static:/app/static:ro
    networks:
      - qrmenu-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G

  # ─── Celery Worker ──────────────────────────────────────────
  qrmenu-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: qrmenu-worker
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${SECRET_KEY}
      POSTGRES_URI: postgresql+asyncpg://qrmenu:${DB_PASSWORD}@qrmenu-db:5432/qrmenu_prod
      REDIS_URI: redis://qrmenu-redis:6379/0
      REDIS_CELERY_URI: redis://qrmenu-redis:6379/1
    depends_on:
      - qrmenu-db
      - qrmenu-redis
    networks:
      - qrmenu-network
    command: celery -A app.core.celery_app worker --loglevel=warning --concurrency=2
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping --destination celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Celery Beat ────────────────────────────────────────────
  qrmenu-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: qrmenu-beat
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${SECRET_KEY}
      POSTGRES_URI: postgresql+asyncpg://qrmenu:${DB_PASSWORD}@qrmenu-db:5432/qrmenu_prod
      REDIS_URI: redis://qrmenu-redis:6379/0
      REDIS_CELERY_URI: redis://qrmenu-redis:6379/1
    depends_on:
      - qrmenu-db
      - qrmenu-redis
    networks:
      - qrmenu-network
    command: celery -A app.core.celery_app beat --loglevel=warning --scheduler celery.beat:PersistentScheduler --schedule /app/logs/celerybeat-schedule
    healthcheck:
      test: ["CMD-SHELL", "pidof -x celery || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qrmenu_postgres_data:
    driver: local
  qrmenu_redis_data:
    driver: local

networks:
  qrmenu-network:
    driver: bridge
    name: qrmenu-network
