version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrmenu_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_NAME=QRMenu SaaS
      - APP_VERSION=2.0.0
      - API_V1_STR=/api/v1
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_URI=postgresql+asyncpg://saas_user:${DB_PASSWORD}@db:5432/saas_db
      - POSTGRES_POOL_SIZE=20
      - POSTGRES_MAX_OVERFLOW=40
      - REDIS_URI=redis://redis:6379/0
      - REDIS_CELERY_URI=redis://redis:6379/1
      - META_WA_ACCESS_TOKEN=${META_WA_ACCESS_TOKEN}
      - META_WA_PHONE_NUMBER_ID=${META_WA_PHONE_NUMBER_ID}
      - META_WA_BUSINESS_ACCOUNT_ID=${META_WA_BUSINESS_ACCOUNT_ID}
      - META_WA_WEBHOOK_VERIFY_TOKEN=${META_WA_WEBHOOK_VERIFY_TOKEN}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - qrmenu_network

  db:
    image: postgres:16-alpine
    container_name: qrmenu_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=saas_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=saas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - qrmenu_network
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=8MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  redis:
    image: redis:7-alpine
    container_name: qrmenu_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - qrmenu_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrmenu_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker -l info -Q acceptance,delivery,reconciliation -c 4
    environment:
      - POSTGRES_URI=postgresql+asyncpg://saas_user:${DB_PASSWORD}@db:5432/saas_db
      - REDIS_CELERY_URI=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis
    networks:
      - qrmenu_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrmenu_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat -l info
    environment:
      - POSTGRES_URI=postgresql+asyncpg://saas_user:${DB_PASSWORD}@db:5432/saas_db
      - REDIS_CELERY_URI=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis
    networks:
      - qrmenu_network

  nginx:
    image: nginx:alpine
    container_name: qrmenu_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - api
    networks:
      - qrmenu_network

  certbot:
    image: certbot/certbot
    container_name: qrmenu_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    networks:
      - qrmenu_network

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_www:

networks:
  qrmenu_network:
    driver: bridge
