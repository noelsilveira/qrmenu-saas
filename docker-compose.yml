version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URI=postgresql+asyncpg://postgres:postgres@db:5432/saas_db
      - REDIS_URI=redis://redis:6379/0
      - REDIS_CELERY_URI=redis://redis:6379/1
    depends_on:
      - db
      - redis
      - osrm
    volumes:
      - .:/app

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=saas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tracking
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  osrm:
    image: osrm/osrm-backend:latest
    ports:
      - "5000:5000"
    volumes:
      - osrm_data:/data
    command: osrm-routed /data/bahrain.osrm

  celery_worker:
    build: .
    command: celery -A app.tasks.celery_app worker -l info -Q acceptance,delivery,reconciliation
    depends_on:
      - redis
      - db

  celery_beat:
    build: .
    command: celery -A app.tasks.celery_app beat -l info
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
  timescale_data:
  osrm_data:
