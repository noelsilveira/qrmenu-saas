server {
    listen 80;
    server_name _;  # Catch-all, will be updated by certbot

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_HERE;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN_HERE/chain.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─── API Routes ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ─── WebSocket Support ─────────────────────────────────────
    location /api/v1/ws/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── Static Frontend Files ─────────────────────────────────
    location / {
        root /var/www/qrmenu/static/customer-pwa;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    location /portal {
        alias /var/www/qrmenu/static/merchant-portal;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    location /kds {
        alias /var/www/qrmenu/static/kds-display;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    location /driver {
        alias /var/www/qrmenu/static/driver-app;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # ─── Static Assets (CSS, JS, Images) ──────────────────────
    location /static/ {
        alias /var/www/qrmenu/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Health Check (for monitoring) ──────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:9000/api/v1/health;
        access_log off;
    }
}
