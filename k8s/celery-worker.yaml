apiVersion: apps/v1
kind: Deployment
metadata:
  name: qrmenu-celery-worker
  namespace: qrmenu
  labels:
    app: qrmenu-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qrmenu-celery-worker
  template:
    metadata:
      labels:
        app: qrmenu-celery-worker
    spec:
      containers:
      - name: worker
        image: qrmenu/api:latest
        command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=warning", "--concurrency=4"]
        envFrom:
        - configMapRef:
            name: qrmenu-config
        - secretRef:
            name: qrmenu-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
