apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qrmenu-ingress
  namespace: qrmenu
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/websocket-services: "qrmenu-api"
spec:
  tls:
  - hosts:
    - api.qrmenu.app
    - app.qrmenu.app
    secretName: qrmenu-tls
  rules:
  - host: api.qrmenu.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qrmenu-api
            port:
              number: 80
  - host: app.qrmenu.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qrmenu-static
            port:
              number: 80
