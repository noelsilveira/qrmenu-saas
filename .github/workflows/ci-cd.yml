name: QR Menu SaaS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # TEST
  # ═══════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qrmenu_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run migrations
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qrmenu_test
      run: alembic upgrade head

    - name: Run Phase 8 tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qrmenu_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
      run: pytest tests/test_phase8_reconciliation.py -v --tb=short

    - name: Run Phase 9 tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qrmenu_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
      run: pytest tests/test_phase9_websocket_kds.py -v --tb=short

    - name: Run Phase 10 tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qrmenu_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
      run: pytest tests/test_phase10_analytics.py -v --tb=short

    - name: Full regression
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qrmenu_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
      run: pytest tests/ -v --tb=short

  # ═══════════════════════════════════════════════════════════════
  # BUILD & PUSH
  # ═══════════════════════════════════════════════════════════════
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        target: production
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY
  # ═══════════════════════════════════════════════════════════════
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Set up Kustomize
      run: |
        curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
        sudo mv kustomize /usr/local/bin/

    - name: Update image tag
      run: |
        cd k8s
        kustomize edit set image qrmenu/api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

    - name: Deploy to Kubernetes
      run: |
        kustomize build k8s/ | kubectl apply -f -
        kubectl rollout status deployment/qrmenu-api -n qrmenu
        kubectl rollout status deployment/qrmenu-celery-worker -n qrmenu
        kubectl rollout status deployment/qrmenu-celery-beat -n qrmenu

    - name: Verify deployment
      run: |
        kubectl get pods -n qrmenu
        kubectl get svc -n qrmenu
        kubectl get ingress -n qrmenu
